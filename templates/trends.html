{% extends "base.html" %}

{% block header_title %}Performance Trends{% endblock %}

{% block content %}
<div class="glass-card p-8 rounded-3xl shadow-sm mb-8">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-10">
        <div>
            <h5 class="text-2xl font-bold text-slate-900 tracking-tight">Financial Trajectory</h5>
            <p class="text-slate-500 font-medium">Visualizing your business growth over time</p>
        </div>
        <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
            <button class="px-6 py-2 bg-white text-indigo-600 rounded-xl text-sm font-bold shadow-sm">Revenue</button>
            <button class="px-6 py-2 text-slate-500 text-sm font-bold hover:text-slate-700">Expenses</button>
            <button class="px-6 py-2 text-slate-500 text-sm font-bold hover:text-slate-700">Profit</button>
        </div>
    </div>
    
    <div class="h-[500px]">
        <canvas id="largeTrendsChart"></canvas>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div class="glass-card p-6 rounded-3xl shadow-sm flex items-center gap-5">
        <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center">
            <i data-lucide="trending-up" class="w-6 h-6"></i>
        </div>
        <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Peak Revenue</p>
            <h6 class="text-xl font-black text-slate-900" id="peak-revenue">₹0</h6>
        </div>
    </div>
    
    <div class="glass-card p-6 rounded-3xl shadow-sm flex items-center gap-5 text-rose-600">
        <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center">
            <i data-lucide="arrow-down-right" class="w-6 h-6"></i>
        </div>
        <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Highest Expense</p>
            <h6 class="text-xl font-black text-slate-900" id="peak-expense">₹0</h6>
        </div>
    </div>

    <div class="glass-card p-6 rounded-3xl shadow-sm flex items-center gap-5 text-emerald-600">
        <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center">
            <i data-lucide="zap" class="w-6 h-6"></i>
        </div>
        <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Average Margin</p>
            <h6 class="text-xl font-black text-slate-900" id="avg-margin">0%</h6>
        </div>
    </div>
</div>

<script>
async function loadTrends() {
    try {
        const response = await fetch('/trends');
        const trends = await response.json();
        trends.sort((a, b) => new Date(a.date) - new Date(b.date));

        const labels = trends.map(t => t.date);
        const revenues = trends.map(t => t.revenue);
        const expenses = trends.map(t => t.expenses);

        // Stats
        document.getElementById('peak-revenue').innerText = `₹${Math.max(...revenues, 0).toLocaleString()}`;
        document.getElementById('peak-expense').innerText = `₹${Math.max(...expenses, 0).toLocaleString()}`;
        
        const summaryRes = await fetch('/summary');
        const summary = await summaryRes.json();
        document.getElementById('avg-margin').innerText = `${summary.metrics.profit_margin}%`;

        const ctx = document.getElementById('largeTrendsChart').getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, 'rgba(79, 70, 229, 0.15)');
        grad.addColorStop(1, 'rgba(79, 70, 229, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Revenue History',
                    data: revenues,
                    borderColor: '#4f46e5',
                    backgroundColor: grad,
                    borderWidth: 4,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 6,
                    pointBackgroundColor: '#fff',
                    pointBorderWidth: 3
                }, {
                    label: 'Expense History',
                    data: expenses,
                    borderColor: '#f43f5e',
                    borderWidth: 2,
                    borderDash: [10, 5],
                    fill: false,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold' } } },
                    x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                }
            }
        });

        lucide.createIcons();
    } catch (e) { console.error(e); }
}

window.onload = loadTrends;
</script>
{% endblock %}
